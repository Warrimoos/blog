<header class="site-header">
  <div class="container">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="Warrimoo Blog home">
      <span class="brand__icon">
        <svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
          <ellipse cx="7" cy="9" rx="2.2" ry="3"/><ellipse cx="12" cy="7.5" rx="2.2" ry="3"/><ellipse cx="17" cy="9" rx="2.2" ry="3"/>
          <path d="M12 12c4 0 6.5 2.6 6.5 5.2 0 2-1.6 3.3-3.3 2.8-1.2-.3-2-.5-3.2-.5s-2 .2-3.2.5c-1.7.5-3.3-.8-3.3-2.8C5.5 14.6 8 12 12 12Z"/>
        </svg>
      </span>
      warrimoo <span class="brand__accent">blog</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Posts</a>
      <a href="{{ '/categories' | relative_url }}"{% if page.url == '/categories' %} aria-current="page"{% endif %}>Categories</a>
      <a href="{{ '/about' | relative_url }}"{% if page.url == '/about' or page.url == '/about/' %} aria-current="page"{% endif %}>About</a>
      <a class="nav-back" href="https://warrimoo.net">warrimoo.net</a>
    </nav>
    <button class="nav-toggle" aria-expanded="false" aria-controls="mobile-nav" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<nav class="mobile-nav" id="mobile-nav" aria-label="Mobile">
  <a href="{{ '/' | relative_url }}">Posts</a>
  <a href="{{ '/categories' | relative_url }}">Categories</a>
  <a href="{{ '/about' | relative_url }}">About</a>
  <a href="https://warrimoo.net">warrimoo.net</a>
  <svg style="margin:1.6rem auto 0;width:44px;opacity:0.5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" color="var(--cream)">
    <ellipse cx="7" cy="9" rx="2.2" ry="3"/><ellipse cx="12" cy="7.5" rx="2.2" ry="3"/><ellipse cx="17" cy="9" rx="2.2" ry="3"/>
    <path d="M12 12c4 0 6.5 2.6 6.5 5.2 0 2-1.6 3.3-3.3 2.8-1.2-.3-2-.5-3.2-.5s-2 .2-3.2.5c-1.7.5-3.3-.8-3.3-2.8C5.5 14.6 8 12 12 12Z"/>
  </svg>
</nav>
