<header class="site-header">
  <div class="container">
    <div class="brand-group">
      <a class="brand" href="https://warrimoo.net" aria-label="Warrimoo home">
        <img class="brand__glyph" src="https://warrimoo.net/assets/img/favicon.svg" alt="" width="38" height="38">
        warrimoo
      </a>
      <span class="brand-sep" aria-hidden="true">/</span>
      <a class="brand brand--sub" href="{{ '/' | relative_url }}" aria-label="Blog home">
        blog
      </a>
    </div>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Posts</a>
      <a href="{{ '/categories' | relative_url }}"{% if page.url == '/categories' %} aria-current="page"{% endif %}>Categories</a>
      <a href="{{ '/about' | relative_url }}"{% if page.url == '/about' or page.url == '/about/' %} aria-current="page"{% endif %}>About</a>
    </nav>
    <button class="nav-toggle" aria-expanded="false" aria-controls="mobile-nav" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
