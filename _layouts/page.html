---
layout: default
---

<article class="page">
  <header class="page-header">
    <div class="container container--narrow">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </div>
  </header>

  <div class="page-body container container--narrow">
    {{ content }}
  </div>
</article>
